<!DOCTYPE html>
<html lang="pt-BR">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frota DPE - Multi-Regional (V61.0)</title>
    <style>

      .header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; margin: -20px -20px 20px -20px; }
      .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
      #status-conexao { font-weight: bold; background: rgba(0, 0, 0, 0.2); padding: 5px 10px; border-radius: 4px; font-size: 0.8em; margin-left: 10px; }
      button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; color: white; font-size: 0.9em; margin-right: 3px; margin-bottom: 3px; }
      .btn-primary { background: var(--primary); width: 100%; font-size: 1.1em; padding: 12px; margin-top: 10px; }
      .btn-edit { background: var(--warning); color: #333; }
      .btn-confirm { background: var(--success); }
      .btn-back { background: #6c757d; color: white; margin-top: 15px; width: 100%; }
      .folga-box { background-color: var(--blocked-bg); border: 1px solid var(--blocked); color: var(--blocked); padding: 15px; border-radius: 5px; margin-top: 20px; margin-bottom: 20px; }
      .folga-item { background: white; padding: 8px 12px; border-radius: 4px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blocked); color: #333; }
      .roteiro-box { border: 1px solid #ccc; background: #fdfdfd; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
      .roteiro-header { font-size: 0.9em; font-weight: bold; color: #555; margin-bottom: 5px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
      .roteiro-controls { display: flex; align-items: flex-end; gap: 10px; background: #eee; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
      .roteiro-lista { margin-top: 10px; width: 100%; border-collapse: collapse; font-size: 0.9em; }
      .roteiro-lista td { padding: 5px; border: 1px solid #ddd; background: #fff; }
      .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; display: inline-block; white-space: nowrap; }
      .status-pendente { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
      .status-confirmado { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .main-form { background: var(--secondary); padding: 25px; border-radius: 8px; border: 1px solid #dee2e6; }
      .editing-mode { border: 2px solid var(--warning); background-color: #fffbf0; }
      .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
      .col { flex: 1; min-width: 200px; }
      label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 0.9em; }
      input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
      .driver-badge { background-color: #e8f0fe; color: var(--primary); padding: 15px; border-left: 5px solid var(--primary); margin-bottom: 25px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; }
      .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
      .unit-card { border: 2px solid #ddd; padding: 30px; border-radius: 10px; cursor: pointer; text-align: center; background: #fff; transition: 0.3s; }
      .unit-card:hover { border-color: var(--primary); transform: translateY(-5px); }
      #login-screen, #comarca-screen { max-width: 400px; margin: 60px auto; text-align: center; padding: 40px; border-top: 6px solid var(--primary); }
      .hidden { display: none !important; }
      .viagem-concluida { background-color: #f2f2f2 !important; color: #777; opacity: 0.6; }

  </head>
  <body>

    <div id="unit-screen" class="container">
      <h1 style="text-align: center; color: var(--primary);">Defensoria Pública da Bahia</h1>
      <div class="unit-grid">
        <div class="unit-card" onclick="selecionarUnidade('14-regional', '14ª Regional - Teixeira de Freitas')">
          <h2>14ª Regional</h2><p>Extremo Sul</p>
        </div>
        <div class="unit-card" onclick="mostrarSub9()">
          <h2>9ª Regional</h2><p>Costa do Descobrimento</p>
        </div>
      </div>
    </div>

    <div id="comarca-screen" class="container hidden">
      <h2 style="color: var(--primary);">Selecione a Comarca</h2>
      <button class="btn-primary" onclick="selecionarUnidade('PORTO SEGURO', '9ª Regional - Porto Seguro')">Porto Seguro</button>
      <button class="btn-primary" onclick="selecionarUnidade('EUNAPOLIS', '9ª Regional - Eunápolis')">Eunápolis</button>
      <button class="btn-back" onclick="voltarRegionais()">⬅ Voltar</button>
    </div>

    <div id="login-screen" class="container hidden">
      <h2 id="login-title" style="color: var(--primary); margin: 0;">Acesso</h2>
      <input type="email" id="login-user" placeholder="E-mail funcional" style="margin: 15px 0" />
      <input type="password" id="login-pass" placeholder="Senha" style="margin-bottom: 15px" />
      <button class="btn-primary" onclick="realizarLogin()">Entrar</button>
      <button class="btn-back" onclick="voltarRegionais()">⬅ Voltar</button>
    </div>

    <div id="app-screen" class="container hidden">
      <div class="header">
        <div class="header-content">
          <div><h2 id="app-unit-name" style="margin: 0; font-size: 1.5em">Frota DPE</h2><span id="status-conexao">Conectando...</span></div>
          <div><span id="nome-usuario" style="font-weight: bold; margin-right: 15px"></span><button class="btn-logout" style="background:rgba(255,255,255,0.1); border:1px solid white;" onclick="fazerLogout()">Sair</button></div>
        </div>
      </div>

      <div class="folga-box">
        <h4 style="margin: 0 0 10px 0;">🛑 Motorista não disponível</h4>
        <div id="lista-folgas-visual"></div>
        <div id="painel-add-folga" class="hidden" style="margin-top: 15px; border-top: 1px dashed #bbb; padding-top: 10px;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">

                <input type="text" id="folga-motivo" placeholder="Motivo" style="flex:2">
                <button style="background:var(--blocked); color:white;" onclick="salvarFolga()">Bloquear</button>
            </div>
        </div>
      </div>

      <div class="main-form">
        <div class="driver-badge">
          <div>🚘 Motorista: <strong id="nome-motorista"></strong></div>
          <span id="tel-motorista" style="font-weight: 600"></span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
          <h3 id="form-title" style="margin: 0; color: var(--primary)">📝 Novo Agendamento</h3>
          <button id="btn-cancel-edit" class="hidden" style="background: #999;" onclick="cancelarEdicao()">❌ Cancelar</button>
        </div>
        <input type="hidden" id="edit-id" />
        <div class="form-row" style="margin-top: 15px">
          <div class="col" style="flex: 2"><label>Solicitante (Obrigatório):</label><input type="text" id="solicitante" list="lista-solicitantes" required /><datalist id="lista-solicitantes"></datalist></div>
          <div class="col"><label>Setor:</label><input type="text" id="setor" value="Geral" /></div>
        </div>

        <div class="roteiro-box">
            <div class="roteiro-header">Roteiro da Viagem</div>
            <div class="roteiro-controls">
                <div class="select-group" style="display:flex; gap:5px; flex:1;">
                    <select id="uf-origem" style="width:70px;" onchange="carregarCidades('origem')"></select>
                    <input type="text" id="cidade-origem" list="list-origem" style="flex:1;">
                    <datalist id="list-origem"></datalist>
                </div>
                <div class="select-group" style="display:flex; gap:5px; flex:1;">
                    <select id="uf-destino" style="width:70px;" onchange="carregarCidades('destino')"></select>
                    <input type="text" id="cidade-destino" list="list-destino" style="flex:1;">
                    <datalist id="list-destino"></datalist>
                </div>
                <button style="background:#fff; color:#333; border:1px solid #ccc; height:42px;" onclick="adicionarTrecho()">Add</button>
                <button style="background:#fff; color:var(--danger); border:1px solid var(--danger); height:42px;" onclick="limparRoteiro()">Limpar</button>
            </div>
            <table class="roteiro-lista"><thead><tr><th>De</th><th>Para</th></tr></thead><tbody id="roteiro-lista-body"></tbody></table>
        </div>

        <div class="form-row">
          <div class="col"><label>Data/Hora Saída:</label><input type="datetime-local" id="saida" /></div>
          <div class="col"><label>Previsão Retorno:</label><input type="datetime-local" id="chegada" /></div>
        </div>
        <label>Motivo:</label><textarea id="motivo" rows="2"></textarea>
        
        <div id="btn-container-actions" style="margin-top:15px;">
            <button id="btn-save" class="btn-primary" onclick="salvarNoFirebase()">✅ Salvar Solicitação</button>
            <button id="btn-whatsapp-manual" class="btn-wpp-notif hidden" style="background:var(--whatsapp); color:white; width:100%; padding:12px; margin-top:5px;" onclick="abrirWhatsAppManual()">📱 Notificar Motorista via WhatsApp</button>
        </div>
      </div>

      <h3 class="section-title">📅 Agenda de Viagens</h3>
      <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse: collapse; min-width: 800px;">

            <tr><th style="padding:12px;">Status</th><th style="padding:12px;">Saída</th><th style="padding:12px;">Retorno</th><th style="padding:12px;">Solicitante</th><th style="padding:12px;">Roteiro</th><th style="padding:12px; text-align:center;">Ações</th></tr>
          </thead>
          <tbody id="tb-corpo"></tbody>
        </table>
      </div>
    </div>

            const status = document.getElementById("status-conexao");
            if (snap.val() === true) { status.innerText = "🟢 Online"; status.style.background = "var(--success)"; }
            else { status.innerText = "🔴 Offline"; status.style.background = "var(--danger)"; }
          });
          configurarUI(); iniciarEscutaBanco();
        }
      });

      function configurarUI() {
        const dl = document.getElementById('lista-solicitantes'); dl.innerHTML = "";
        Object.keys(CONTATOS[regionalID].equipe).forEach(n => dl.innerHTML += `<option value="${n}">`);
        document.getElementById('nome-motorista').innerText = CONTATOS[regionalID].motorista;
        document.getElementById('tel-motorista').innerText = `📱 ${CONTATOS[regionalID].tel}`;
        const ufo = document.getElementById('uf-origem'); const ufd = document.getElementById('uf-destino');
        ufo.innerHTML = ""; ufd.innerHTML = "";
        estados.forEach(uf => { ufo.innerHTML += `<option value="${uf}" ${uf==='BA'?'selected':''}>${uf}</option>`; ufd.innerHTML += `<option value="${uf}" ${uf==='BA'?'selected':''}>${uf}</option>`; });
        carregarCidades('origem'); carregarCidades('destino');
      }

      window.carregarCidades = (t) => {
        const uf = document.getElementById(`uf-${t}`).value;
        const dl = document.getElementById(`list-${t}`); dl.innerHTML = "";
        if(uf === 'BA') cidadesBA.forEach(c => dl.innerHTML += `<option value="${c}">`);
        else if(uf === 'ES') cidadesES.forEach(c => dl.innerHTML += `<option value="${c}">`);
        else if(capitais[uf]) dl.innerHTML += `<option value="${capitais[uf]}">`;
        if(t === 'origem' && uf === 'BA' && regionalID === '14-regional') document.getElementById(`cidade-${t}`).value = "TEIXEIRA DE FREITAS";
      };

      window.adicionarTrecho = () => {
        const cidOrg = document.getElementById('cidade-origem').value; const cidDst = document.getElementById('cidade-destino').value;
        if(!cidOrg || !cidDst) return alert("Selecione as cidades.");
        window.roteiroAtual.push({ origem: `${document.getElementById('uf-origem').value} - ${cidOrg}`, destino: `${document.getElementById('uf-destino').value} - ${cidDst}` });
        renderRoteiro();
        document.getElementById('uf-origem').value = document.getElementById('uf-destino').value;
        carregarCidades('origem');
        document.getElementById('cidade-origem').value = cidDst;
      };

      function renderRoteiro() {
        const b = document.getElementById('roteiro-lista-body'); b.innerHTML = "";
        if(window.roteiroAtual.length === 0) b.innerHTML = "<tr><td colspan='2' style='text-align:center; color:#999;'>Sem trechos.</td></tr>";
        window.roteiroAtual.forEach(t => b.innerHTML += `<tr><td>${t.origem}</td><td>${t.destino}</td></tr>`);
      }

      window.limparRoteiro = () => { window.roteiroAtual = []; renderRoteiro(); };

      function iniciarEscutaBanco() {
        const root = (regionalID === '14-regional' ? '' : `unidades/${regionalID}/`);
        onValue(ref(db, root + "viagens"), (s) => {
          window.listaViagens = s.val() ? Object.keys(s.val()).map(k => ({...s.val()[k], id: k})) : [];
          atualizarTabelaGlobal();
        });
        onValue(ref(db, root + "folgas"), (s) => {
          window.listaFolgas = s.val() ? Object.keys(s.val()).map(k => ({...s.val()[k], id: k})) : [];
          renderFolgas();
        });
      }

      // --- LOGICA DE CONFLITO ---
      function temConflito(novaSaida, novaChegada, ignorarId = null) {
          const buffer = 5 * 60 * 1000;
          const iniN = new Date(novaSaida).getTime();
          const fimN = new Date(novaChegada).getTime();
          for(let v of window.listaViagens) {
              if(ignorarId && v.id === ignorarId) continue;
              const iniE = new Date(v.saida).getTime();
              const fimE = new Date(v.chegada).getTime();
              if(iniN < (fimE + buffer) && (fimN + buffer) > iniE) return v;
          }
          return null;
      }

      // --- SALVAR COM WHATSAPP FIX ---
      window.salvarNoFirebase = () => {
        const solicitante = document.getElementById("solicitante").value;
        const saida = document.getElementById("saida").value;
        const chegada = document.getElementById("chegada").value;
        const id = document.getElementById("edit-id").value;
        
        if(!solicitante || !saida || !chegada) return alert("Preencha solicitante e horários!");
        
        const conflito = temConflito(saida, chegada, id);
        if(conflito) return alert(`🚫 CONFLITO DE HORÁRIO!\nEste período já está reservado por: ${conflito.solicitante}`);

        const trajetoString = window.roteiroAtual.map(t => `${t.origem} ➝ ${t.destino}`).join("\n📍 ");
        const dados = {
          solicitante: solicitante, setor: document.getElementById("setor").value,
          saida: saida, chegada: chegada, motivo: document.getElementById("motivo").value,
          trajetoExibicao: trajetoString || "Trecho Direto", registradoPor: window.userEmail,
          status: "Pendente", roteiroArray: window.roteiroAtual
        };
        const root = (regionalID === '14-regional' ? '' : `unidades/${regionalID}/`) + 'viagens';
        
        const msg = `Olá ${CONTATOS[regionalID].motorista}! 🚗 Nova viagem agendada.\n\n*Solicitante:* ${dados.solicitante}\n*Saída:* ${new Date(dados.saida).toLocaleString()}\n*Retorno:* ${new Date(dados.chegada).toLocaleString()}\n*Motivo:* ${dados.motivo}\n*Roteiro:*\n📍 ${dados.trajetoExibicao}`;
        window.dadosWppTemp = msg;

        if(id) {
            update(ref(db, `${root}/${id}`), dados).then(() => {
                document.getElementById("btn-whatsapp-manual").classList.remove("hidden");
                document.getElementById("btn-save").innerText = "💾 Salvar Ajustes";
                alert("Ajustes salvos! Use o botão abaixo para notificar o motorista.");
            });
        } else {
            push(ref(db, root), dados).then(() => {
                if(confirm("Agendado! Notificar motorista no WhatsApp?")) {
                    window.open(`https://wa.me/${CONTATOS[regionalID].tel}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                setTimeout(() => location.reload(), 1000);
            });
        }
      };

      window.abrirWhatsAppManual = () => {
          window.open(`https://wa.me/${CONTATOS[regionalID].tel}?text=${encodeURIComponent(window.dadosWppTemp)}`, '_blank');
          setTimeout(() => location.reload(), 1500);
      };

      window.atualizarTabelaGlobal = () => {
        const tb = document.getElementById("tb-corpo"); tb.innerHTML = "";
        const agora = new Date();
        window.listaViagens.sort((a,b) => new Date(b.saida) - new Date(a.saida)).forEach(v => {
          const status = v.status || "Pendente";
          const foiRealizada = new Date(v.chegada) < agora;
          let btns = "";
          if(window.isAdmin || v.registradoPor === window.userEmail) btns += `<button class="btn-edit" onclick="prepararEdicao('${v.id}')">✏️</button>`;
          if(window.isMotorista && status !== "Confirmado") btns += `<button class="btn-confirm" onclick="confirmar('${v.id}')">✔</button>`;
          if(window.isAdmin) btns += `<button class="btn-delete" style="background:var(--danger)" onclick="deletar('${v.id}')">🗑️</button>`;

          tb.innerHTML += `<tr class="${foiRealizada ? 'viagem-concluida' : ''}" style="border-bottom: 1px solid #eee;">
            <td style="padding:12px; text-align:center"><span class="status-badge ${status==='Confirmado'?'status-confirmado':'status-pendente'}">${status}</span></td>
            <td style="padding:12px;"><strong>${new Date(v.saida).toLocaleString()}</strong></td>
            <td style="padding:12px;">${new Date(v.chegada).toLocaleString()}</td>
            <td style="padding:12px;"><strong>${v.solicitante}</strong></td>
            <td style="padding:12px; font-size:0.85em; white-space: pre-line;">${v.trajetoExibicao}</td>
            <td style="padding:12px; text-align:center; white-space:nowrap;">${btns}</td>
          </tr>`;
        });
      };

      window.prepararEdicao = (id) => {
        const v = window.listaViagens.find(x => x.id === id);
        document.getElementById('edit-id').value = id; document.getElementById('solicitante').value = v.solicitante;
        document.getElementById('saida').value = v.saida; document.getElementById('chegada').value = v.chegada;
        document.getElementById('motivo').value = v.motivo; window.roteiroAtual = v.roteiroArray || []; renderRoteiro();
        document.querySelector(".main-form").classList.add("editing-mode"); document.getElementById("btn-cancel-edit").classList.remove("hidden");
        document.getElementById("btn-save").innerText = "💾 Salvar Alterações"; window.scrollTo(0,0);
      };

      window.confirmar = (id) => { 
          const v = window.listaViagens.find(x => x.id === id);
          update(ref(db, (regionalID === '14-regional' ? '' : `unidades/${regionalID}/`) + `viagens/${id}`), {status: "Confirmado"}); 
          const telSol = CONTATOS[regionalID].equipe[v.solicitante];
          if(telSol && confirm("Confirmado! Avisar o solicitante no WhatsApp?")) {
              window.open(`https://wa.me/${telSol}?text=${encodeURIComponent('✅ Sua viagem para ' + v.trajetoExibicao.replace(/\n/g, ' ') + ' foi confirmada.')}`, '_blank');
          }
      };

      window.deletar = (id) => { if(confirm("Excluir?")) remove(ref(db, (regionalID==='14-regional'?'':'unidades/'+regionalID+'/') + "viagens/" + id)); };
      window.cancelarEdicao = () => location.reload();
      window.fazerLogout = () => { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
      window.salvarFolga = () => { push(ref(db, (regionalID === '14-regional' ? '' : `unidades/${regionalID}/`) + 'folgas'), { inicio: document.getElementById('folga-inicio').value, fim: document.getElementById('folga-fim').value, motivo: document.getElementById('folga-motivo').value }); };
      function renderFolgas() { const l = document.getElementById('lista-folgas-visual'); l.innerHTML = ""; window.listaFolgas.forEach(f => l.innerHTML += `<div class="folga-item"><strong>🚫 ${f.inicio} a ${f.fim}</strong>: ${f.motivo}</div>`); }
    </script>
  </body>
</html>
