<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>14ª Regional - Frota (V39.0)</title>
    <style>
      :root { --primary: #003366; --secondary: #f8f9fa; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark-text: #333; --route-audit: #6f42c1; }
      body { font-family: "Segoe UI", Roboto, sans-serif; background-color: #eef2f5; margin: 0; padding-bottom: 50px; }
      .container { max-width: 1150px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); }
      .header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; margin: -20px -20px 20px -20px; }
      button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
      .btn-primary { background: var(--primary); width: 100%; font-size: 1.1em; padding: 12px; margin-top: 10px; }
      .btn-edit { background: var(--warning); color: #333; }
      .btn-delete { background: var(--danger); }
      .main-form { background: var(--secondary); padding: 25px; border-radius: 8px; border: 1px solid #dee2e6; }
      .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
      .col { flex: 1; min-width: 200px; }
      label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
      input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9em; margin-top: 15px; }
      th { background: #004080; color: white; padding: 12px; text-align: left; }
      td { border-bottom: 1px solid #eee; padding: 12px; vertical-align: top; }
      .orig-date { font-size: 0.75em; color: var(--danger); font-style: italic; display: block; margin-top: 4px; }
      .orig-route { font-size: 0.75em; color: var(--route-audit); font-style: italic; display: block; margin-top: 4px; border-top: 1px dotted #ccc; padding-top: 2px; }
      .hidden { display: none !important; }
      .editing-mode { border: 2px solid var(--warning); background-color: #fffbf0; }
      .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
      .status-pendente { background-color: #fff3cd; color: #856404; }
      .status-confirmado { background-color: #d4edda; color: #155724; }
    </style>
  </head>
  <body>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
      import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDvGkxC9WkYICERhbIHcE9yComvh5AF2gw",
        authDomain: "frota14regional-8fecc.firebaseapp.com",
        databaseURL: "https://frota14regional-8fecc-default-rtdb.firebaseio.com",
        projectId: "frota14regional-8fecc",
        storageBucket: "frota14regional-8fecc.firebasestorage.app",
        messagingSenderId: "974555151272",
        appId: "1:974555151272:web:36d293685728a4e40bfb9d"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const auth = getAuth(app);

      window.listaViagens = [];
      window.roteiroAtual = [];

      onAuthStateChanged(auth, (user) => {
        if (user) {
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("app-screen").classList.remove("hidden");
          document.getElementById("nome-usuario").innerText = user.email;
          iniciarEscuta();
        } else {
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("app-screen").classList.add("hidden");
        }
      });

      window.realizarLogin = () => {
        const email = document.getElementById("login-user").value;
        const pass = document.getElementById("login-pass").value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao entrar."));
      };

      window.fazerLogout = () => signOut(auth).then(() => location.reload());

      function iniciarEscuta() {
        onValue(ref(db, "viagens"), (snapshot) => {
          const data = snapshot.val();
          window.listaViagens = data ? Object.keys(data).map(k => ({...data[k], id: k})) : [];
          renderizarTabela();
        });
      }

      window.salvarNoFirebase = () => {
          const idEdicao = document.getElementById("edit-id").value;
          const saidaInput = document.getElementById("saida").value;
          const chegadaInput = document.getElementById("chegada").value;
          
          const f = {
              solicitante: document.getElementById("solicitante").value,
              setor: document.getElementById("setor").value,
              saida: saidaInput,
              chegada: chegadaInput,
              motivo: document.getElementById("motivo").value,
              trajetoExibicao: document.getElementById("cidade-destino").value.toUpperCase(),
              registradoPor: auth.currentUser.email,
              timestamp: Date.now()
          };

          if(!f.saida || !f.chegada || !f.solicitante) return alert("Preencha os campos obrigatórios.");

          // --- TRAVAS DE SEGURANÇA (V39.0) ---
          const dataSaida = new Date(f.saida);
          const dataRetorno = new Date(f.chegada);
          const agora = new Date();

          if (dataSaida < agora && !idEdicao) {
              return alert("⚠️ ERRO: Não é possível realizar agendamentos com data retroativa.");
          }

          if (dataRetorno <= dataSaida) {
              return alert("⚠️ ERRO: A data de retorno não pode ser anterior ou igual à data de saída.");
          }

          // --- LÓGICA DE AUDITORIA ---
          if (idEdicao) {
              const antigo = window.listaViagens.find(v => v.id === idEdicao);
              if (antigo) {
                  if (antigo.saida !== f.saida) f.saidaOriginal = antigo.saidaOriginal || antigo.saida;
                  if (antigo.chegada !== f.chegada) f.chegadaOriginal = antigo.chegadaOriginal || antigo.chegada;
                  if (antigo.trajetoExibicao !== f.trajetoExibicao) f.trajetoOriginal = antigo.trajetoOriginal || antigo.trajetoExibicao;
              }
              update(ref(db, "viagens/" + idEdicao), f).then(() => { alert("Atualizado!"); cancelarEdicao(); });
          } else {
              f.status = "Pendente";
              push(ref(db, "viagens"), f).then(() => { alert("Agendado!"); enviarZap(f); cancelarEdicao(); });
          }
      };

      function renderizarTabela() {
          const tb = document.getElementById("tb-corpo");
          tb.innerHTML = "";
          window.listaViagens.sort((a,b) => new Date(b.saida) - new Date(a.saida));
          
          window.listaViagens.forEach(i => {
              const fmt = (d) => new Date(d).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'});
              
              let hSaida = `<strong>${fmt(i.saida)}</strong>`;
              if(i.saidaOriginal) hSaida += `<span class="orig-date">(Original: ${fmt(i.saidaOriginal)})</span>`;

              let hRetorno = `<strong>${fmt(i.chegada)}</strong>`;
              if(i.chegadaOriginal) hRetorno += `<span class="orig-date">(Antigo: ${fmt(i.chegadaOriginal)})</span>`;

              let hRota = i.trajetoExibicao;
              if(i.trajetoOriginal) hRota += `<span class="orig-route">Original: ${i.trajetoOriginal}</span>`;

              tb.innerHTML += `<tr>
                <td><span class="status-badge ${i.status==='Confirmado'?'status-confirmado':'status-pendente'}">${i.status || 'Pendente'}</span></td>
                <td>${hSaida}</td>
                <td>${hRetorno}</td>
                <td><strong>${i.solicitante}</strong></td>
                <td>${hRota}</td>
                <td><button class="btn-edit" onclick="prepararEdicao('${i.id}')">✏️</button></td>
              </tr>`;
          });
      }

      window.prepararEdicao = (id) => {
          const i = window.listaViagens.find(v => v.id === id);
          document.getElementById("edit-id").value = id;
          document.getElementById("solicitante").value = i.solicitante;
          document.getElementById("saida").value = i.saida;
          document.getElementById("chegada").value = i.chegada;
          document.getElementById("cidade-destino").value = i.trajetoExibicao;
          document.querySelector(".main-form").classList.add("editing-mode");
      };

      window.cancelarEdicao = () => {
          document.getElementById("edit-id").value = "";
          document.querySelectorAll('input, textarea').forEach(el => el.value = "");
          document.querySelector(".main-form").classList.remove("editing-mode");
      };

      function enviarZap(d) {
          const tel = "5571996384423";
          const msg = `*NOVA VIAGEM*\nSolicitante: ${d.solicitante}\nSaída: ${d.saida}\nDestino: ${d.trajetoExibicao}`;
          if(confirm("Avisar motorista?")) window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
      }
    </script>

    <div id="login-screen" class="container" style="max-width:400px; text-align:center;">
        <h2>14ª Regional</h2>
        <input type="email" id="login-user" placeholder="E-mail"><br><br>
        <input type="password" id="login-pass" placeholder="Senha"><br><br>
        <button class="btn-primary" onclick="realizarLogin()">Entrar</button>
    </div>

    <div id="app-screen" class="container hidden">
      <div class="header">
        <h2 style="margin:0">Frota DPE - V39.0</h2>
        <span id="nome-usuario"></span> <button onclick="fazerLogout()" style="background:red">Sair</button>
      </div>

      <div class="main-form" style="margin-top:20px;">
        <input type="hidden" id="edit-id">
        <label>Solicitante</label><input type="text" id="solicitante">
        <div class="form-row">
            <div class="col"><label>Setor</label><input type="text" id="setor" value="Geral"></div>
            <div class="col"><label>Destino</label><input type="text" id="cidade-destino"></div>
        </div>
        <div class="form-row">
            <div class="col"><label>Saída</label><input type="datetime-local" id="saida"></div>
            <div class="col"><label>Previsão Retorno</label><input type="datetime-local" id="chegada"></div>
        </div>
        <label>Motivo</label><textarea id="motivo"></textarea>
        <button class="btn-primary" onclick="salvarNoFirebase()">✅ Agendar e Avisar Motorista</button>
      </div>

      <table>
          <thead>
            <tr><th>Status</th><th>Saída</th><th>Retorno</th><th>Solicitante</th><th>Roteiro</th><th>Ações</th></tr>
          </thead>
          <tbody id="tb-corpo"></tbody>
      </table>
    </div>
  </body>
</html>
